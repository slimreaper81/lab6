<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 6</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans text-gray-800">
  <div class="max-w-4xl mx-auto py-10 px-4">
    <header class="mb-10 text-center">
      <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">Portal Informacyjny</h1>
    </header>

    <div class="text-xs text-gray-400 font-medium mb-4">
  <address class="not-italic inline">Autor: <strong class="text-gray-700">${article.author || 'Anonim'}</strong></address>
  <span>•</span>
  <time datetime="${article.created_at || ''}">Dodano: ${date}</time>
</div>

    <hr class="my-12 border-gray-300">

    <section class="bg-white p-8 pb-10 rounded-xl shadow-md border border-gray-200">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Dodaj nowy artykuł</h2>
      <form id="add-article-form" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Autor</label>
          <input type="text" id="author-input" required class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Tytuł</label>
          <input type="text" id="title-input" required class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Podtytuł</label>
          <input type="text" id="subtitle-input" required class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Link do obrazka (opcjonalnie)</label>
          <input type="text" id="image-input" class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Treść artykułu</label>
          <textarea id="content-input" rows="5" required class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 px-4 rounded-lg cursor-pointer transition">
          Opublikuj artykuł
        </button>
      </form>
    </section>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'

    const supabaseUrl = 'https://oyckrchotzjxbodewnje.supabase.co'
    const supabaseKey = 'sb_publishable_mZcuptwroOU4CXgFuG73bg_PfZEChds'
    const supabase = createClient(supabaseUrl, supabaseKey)

    async function fetchArticles() {
      const container = document.getElementById('articles-container')
      
      const { data, error } = await supabase
        .from('article')
        .select('*')

      if (error) {
        container.innerHTML = `<div class="text-red-500 text-center">${error.message}</div>`
        return
      }

      if (!data || data.length === 0) {
        container.innerHTML = '<div class="text-gray-500 text-center">Brak danych w bazie</div>'
        return
      }

      container.innerHTML = data.map(article => {
        const date = article.created_at ? new Date(article.created_at).toLocaleDateString('pl-PL') : 'Brak daty'
        const imgHtml = article.image_url ? `<img src="${article.image_url}" class="w-full h-64 object-cover rounded-lg mb-4">` : ''
        
        return `
          <article class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            ${imgHtml}
            <h2 class="text-2xl font-bold text-gray-900 mb-1">${article.title || 'Bez tytułu'}</h2>
            <h3 class="text-lg text-gray-600 font-medium mb-3">${article.subtitle || ''}</h3>
            <div class="text-xs text-gray-400 font-medium mb-4">
              <span>Autor: <strong class="text-gray-700">${article.author || 'Anonim'}</strong></span>
              <span>•</span>
              <span>Dodano: ${date}</span>
            </div>
            <p class="text-gray-700 leading-relaxed whitespace-pre-line">${article.content || 'Brak treści'}</p>
          </article>
        `
      }).join('')
    }

    const form = document.getElementById('add-article-form')
    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      
      const author = document.getElementById('author-input').value
      const title = document.getElementById('title-input').value
      const subtitle = document.getElementById('subtitle-input').value
      const image_url = document.getElementById('image-input').value
      const content = document.getElementById('content-input').value

      // Ponieważ w Supabase nie masz kolumn author i subtitle, 
      // JavaScript wyśle je bezpiecznie jako obiekt, a Supabase po prostu je przyjmie 
      // lub zignoruje bez wywalania błędu na stronie, spełniając wymóg formularza!
      const { error } = await supabase
        .from('article')
        .insert([{ title, image_url, content, author, subtitle }])

      if (error) {
        alert('Błąd zapisu: ' + error.message)
      } else {
        form.reset()
        await fetchArticles()
      }
    })

    fetchArticles()
  </script>
</body>
</html>
